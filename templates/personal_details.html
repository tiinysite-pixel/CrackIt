{% extends "base.html" %}
{% block content %}
<div class="card p-4 mx-auto" style="max-width:500px">
    <h3 class="mb-3 text-center">Complete Your Profile</h3>
    <p class="text-warning">⚠️ Fill only correct details to prevent interruptions.</p>
    <form method="POST">
        <div class="mb-3"><label>Full Name</label><input type="text" name="name" class="form-control" required></div>
        <div class="mb-3"><label>Phone Number</label><input type="tel" name="phone" class="form-control" required></div>
        <div class="mb-3"><label>Place</label><input type="text" name="place" class="form-control" required></div>
        <button class="btn btn-primary w-100">Continue to Dashboard</button>
    </form>
</div>
{% endblock %}
