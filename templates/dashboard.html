{% extends "base.html" %}
{% block content %}

<h3 class="mb-4 text-center">Admin Dashboard</h3>

<div class="text-center mb-4">
    <a href="/add-question" class="btn btn-success me-3">Add Question</a>
    <a href="/logout" class="btn btn-danger">Logout</a>
</div>

<div class="accordion" id="companyAccordion">

    {% for company in questions|groupby("company") %}
    {% set company_index = loop.index %}

    <div class="accordion-item mb-4 shadow">

        <!-- Company Header -->
        <h2 class="accordion-header">
            <button class="accordion-button collapsed"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#collapse{{ company_index }}">

                <strong>{{ company.grouper }}</strong>
            </button>
        </h2>

        <!-- Company Body -->
        <div id="collapse{{ company_index }}"
             class="accordion-collapse collapse"
             data-bs-parent="#companyAccordion">

            <div class="accordion-body">

                <!-- Company Specific Filters -->
                <div class="row mb-3">
                    <div class="col-md-6 mb-2">
                        <select class="form-control"
                                onchange="applyCompanyFilter('{{ company_index }}')"
                                id="difficulty{{ company_index }}">
                            <option value="All">All Difficulties</option>
                            <option value="Easy">Easy</option>
                            <option value="Medium">Medium</option>
                            <option value="Hard">Hard</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-2">
                        <input type="text"
                               class="form-control"
                               placeholder="Search in {{ company.grouper }}..."
                               onkeyup="applyCompanyFilter('{{ company_index }}')"
                               id="search{{ company_index }}">
                    </div>
                </div>

                <!-- Questions -->
                <div class="accordion">

                    {% for q in company.list %}
                    <div class="accordion-item mb-2 shadow-sm question-item-{{ company_index }}"
                         data-difficulty="{{ q.difficulty if q.difficulty else 'Medium' }}">

                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed"
                                    type="button"
                                    data-bs-toggle="collapse"
                                    data-bs-target="#question{{ q._id }}">

                                <span class="badge
                                {% if q.difficulty == 'Easy' %}
                                    bg-success
                                {% elif q.difficulty == 'Medium' %}
                                    bg-warning text-dark
                                {% else %}
                                    bg-danger
                                {% endif %}
                                me-2">

                                    {{ q.difficulty if q.difficulty else 'Medium' }}
                                </span>

                                {{ q.category }} –
                                {{ q.question.split('\n')[0] }}

                            </button>
                        </h2>

                        <div id="question{{ q._id }}"
                             class="accordion-collapse collapse">

                            <div class="accordion-body">

                                <pre class="question-box">
{{ q.question }}
                                </pre>

                                <div class="mt-3">
                                    <a href="/edit-question/{{ q._id }}"
                                       class="btn btn-warning btn-sm me-2">
                                        Edit
                                    </a>

                                    <a href="/delete-question/{{ q._id }}"
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Are you sure you want to delete this question?');">
                                        Delete
                                    </a>
                                </div>

                            </div>
                        </div>

                    </div>
                    {% endfor %}

                </div>

            </div>

        </div>

    </div>

    {% endfor %}

</div>

<!-- Company-wise Filter Script -->
<script>
function applyCompanyFilter(companyIndex) {

    let searchValue = document.getElementById("search" + companyIndex).value.toLowerCase();
    let difficultyValue = document.getElementById("difficulty" + companyIndex).value;

    let items = document.querySelectorAll(".question-item-" + companyIndex);

    items.forEach(item => {
        let text = item.innerText.toLowerCase();
        let itemDifficulty = item.getAttribute("data-difficulty");

        let matchesSearch = text.includes(searchValue);
        let matchesDifficulty = (difficultyValue === "All" || itemDifficulty === difficultyValue);

        if (matchesSearch && matchesDifficulty) {
            item.style.display = "";
        } else {
            item.style.display = "none";
        }
    });
}
</script>

{% endblock %}
