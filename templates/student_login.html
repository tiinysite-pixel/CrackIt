{% extends "base.html" %}
{% block content %}
<div class="login-wrapper d-flex justify-content-center align-items-center">
    <div class="login-container">
        <div class="login-left"><img src="{{ url_for('static', filename='images/login-illustration.png') }}" alt="Login"></div>
        <div class="login-right">
            <h3 class="text-center mb-4">Student Login</h3>
            <form method="POST">
                <div class="mb-3"><input type="email" name="username" class="form-control" placeholder="Email" required></div>
                <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Password" required></div>
                <button type="submit" class="btn login-btn w-100">Login</button>
            </form>
            <div class="text-center mt-3 small-link">Contact admin for credentials</div>
        </div>
    </div>
</div>
{% endblock %}
