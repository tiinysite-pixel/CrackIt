{% extends "base.html" %}
{% block content %}
<h2>Create New Test</h2>
<form method="POST">
    <div class="mb-3"><label>Test Name</label><input type="text" name="test_name" class="form-control" required></div>
    <div class="mb-3"><label>Description</label><textarea name="description" class="form-control"></textarea></div>
    <div class="mb-3"><label><input type="checkbox" name="proctored"> Proctored (webcam required)</label></div>
    <div class="mb-3"><label>Start Date & Time</label><input type="datetime-local" name="start_datetime" class="form-control" required></div>
    <div class="mb-3"><label>Duration (minutes)</label><input type="number" name="duration" class="form-control" required></div>
    <div class="mb-3"><label>Instructions</label><textarea name="instructions" class="form-control" rows="4"></textarea></div>
    <div class="mb-3"><label>Select Students</label>
        <select name="selected_students" multiple class="form-control" size="5">
            {% for s in students %}<option value="{{ s.username }}">{{ s.username }}</option>{% endfor %}
        </select>
    </div>
    <div class="mb-3"><label>Select Questions from Bank</label>
        <select name="question_ids" multiple class="form-control" size="10">
            {% for q in questions %}<option value="{{ q._id }}">{{ q.company }} - {{ q.category[:50] }}</option>{% endfor %}
        </select>
    </div>
    <div class="mb-3"><label><input type="checkbox" name="shuffle"> Randomise questions per student</label></div>
    <button type="submit" class="btn btn-primary">Create Test</button>
</form>
{% endblock %}
